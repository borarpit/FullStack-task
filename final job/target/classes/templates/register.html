<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - JobPortal</title>
    <th:block th:replace="~{fragments :: headerContent}"></th:block>
</head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container" style="max-width: 600px; padding-top: 3rem;">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Join JobPortal</h2>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe" required>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com" required>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters" required>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>I am a...</label>
                    <select th:field="*{role}" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="STUDENT">Student (Job Seeker)</option>
                        <option value="EMPLOYER">Employer (Recruiter)</option>
                    </select>
                    <p th:if="${#fields.hasErrors('role')}" th:errors="*{role}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>

                <div class="form-group">
                    <label>Location (Optional)</label>
                    <input type="text" th:field="*{location}" class="form-control" placeholder="City, Country">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Create Account</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600;">Login here</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
